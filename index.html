<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Tifelabs:: systems programmer & photographer">
<title>Tifelabs</title>
<link rel="icon" href="./assets/images/baby.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f2ede4;--ink:#1c1917;--muted:#2d6a4f;--accent:#2d6a4f;--rule:#ddd8ce}
    
    body{
        font:400 15px/1.75 'Spectral',Georgia,serif;
        color:var(--ink);background:var(--bg);
        max-width:520px;margin:0 auto;padding:72px 28px 96px
    }
    .banner{width:100%;height:80px;object-fit:cover;object-position:center 38%;display:block;border-radius:2px;margin-bottom:40px}
    nav{display:flex;gap:28px;margin-bottom:88px}
    nav a{font:400 12px/1 'JetBrains Mono',monospace;color:var(--muted);text-decoration:none;letter-spacing:.04em}
    nav a.active{color:var(--ink);font-weight:400}
    nav a:hover{color:var(--ink)}
    h1{font:300 28px/1.2 'Spectral',serif;letter-spacing:-.02em;margin-bottom:14px}
    h1 em{font-style:italic;color:var(--accent)}
    .intro{font:300 14px/1.8 'Spectral',serif;color:#4a4540;max-width:400px;margin-bottom:80px}
    .reshiram{position:fixed;right:10px;bottom:50px;display:block}
    
    footer{
        font:300 11px/2.2 'JetBrains Mono',monospace;
        color:var(--muted);letter-spacing:.02em
    }
    footer a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--rule);padding-bottom:1px}
    footer a:hover{opacity:.6;border-color:var(--ink)}
    
    @media(max-width:600px){
        body{padding:48px 20px 72px}
        nav,.intro{margin-bottom:56px}
    }
</style>
</head>
<body>
    <img class="banner" src="./assets/images/crabapple.webp" alt="Crabapple">

    <nav>
        <a href="index.html" class="active">&#120582;</a>
        <a href="./blogs/">Writing</a>
        <a href="./photography/">Photography</a>
        <a href="./resource/">Resources</a>
    </nav>

    <main>
        <h1>Hi, I'm <em>T</em>.</h1>
        <p class="intro">I love computers, I do programming and hobby photography.</p>
    </main>

    <img src="./assets/gifs/reshiram.gif" class="reshiram" alt="">

    <footer>
        <div>alberta, ca</div>
        <div style="display:flex;align-items:center;gap:6px">
            <img src="./assets/gifs/mail_gif.gif" alt="" height="30" width="20">
            <a href="mailto:tifelabs@gmail.com">tifelabs@gmail.com</a>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
            <img src="./assets/gifs/git.gif" alt="" height="20" width="20">
            <a href="https://github.com/tifelabs" target="_blank" rel="noopener noreferrer">github</a>
        </div>
    </footer>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W3CM55WK3Y"></script>
    <script>
        window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}
        gtag('js',new Date());gtag('config','G-W3CM55WK3Y')
    </script>
</body>
</html>
