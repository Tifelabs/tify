<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root { --bg:#f2ede4; --ink:#1c1917; --muted:#2d6a4f; --accent:#2d6a4f; --rule:#ddd8ce; }
  body {
    font: 400 15px/1.75 'Spectral', Georgia, serif;
    color: var(--ink); background: var(--bg);
    max-width: 520px; margin: 0 auto; padding: 72px 28px 96px;
    opacity: 0; animation: fadein .5s ease forwards;
  }
  @keyframes fadein { to { opacity:1; } }

  .banner { width:100%; height:80px; object-fit:cover; object-position:center 38%; display:block; border-radius:2px; margin-bottom:40px; opacity:.88; }

  nav { display:flex; gap:28px; margin-bottom:88px; }
  nav a { font:400 12px/1 'JetBrains Mono',monospace; color:var(--muted); text-decoration:none; letter-spacing:.04em; }
  nav a.active { color:var(--ink); font-weight:400; }
  nav a:hover { color:var(--ink); }

  h1 { font:300 28px/1.2 'Spectral',serif; letter-spacing:-.02em; margin-bottom:14px; }
  h1 em { font-style:italic; color:var(--accent); }
  .intro { font:300 14px/1.8 'Spectral',serif; color:#4a4540; max-width:400px; margin-bottom:80px; }

  .section-label { font:400 9.5px/1 'JetBrains Mono',monospace; color:#b0aa9f; letter-spacing:.14em; text-transform:uppercase; margin-bottom:18px; }
  .projects { margin-bottom:80px; }
  .project-list { border-top:1px solid var(--rule); }

  .project-item {
    display:grid; grid-template-columns:1fr auto; align-items:baseline; gap:16px;
    padding:13px 0; border-bottom:1px solid var(--rule);
    text-decoration:none; color:inherit; transition:opacity .15s;
  }
  .project-item:hover .project-name { color:#1f5c40; }
  .project-item:hover .project-arrow { color:var(--accent); }
  .project-name { font:500 14px/1.4 'Spectral',serif; color:var(--accent); }
  .project-desc { font:300 italic 12.5px/1.5 'Spectral',serif; color:var(--muted); margin-top:2px; }
  .project-desc em { font-style:normal; color:#7a7570; }
  .project-arrow { font:300 14px/1 'JetBrains Mono',monospace; color:#c8c3bb; }

  footer { font:300 11px/2.2 'JetBrains Mono',monospace; color:var(--muted); letter-spacing:.02em; }
  footer a { color:var(--muted); text-decoration:none; border-bottom:1px solid var(--rule); padding-bottom:1px; transition:border-color .18s,opacity .18s; }
  footer a:hover { opacity:.6; border-color:var(--ink); }

  @media (max-width:600px) {
    body { padding:48px 20px 72px; }
    nav, .intro, .projects { margin-bottom:56px; }
    .reshiram { display:block !important; }
  }
</style>
</head>
